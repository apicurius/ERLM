# RLM scaffold THESIS config — CONTROL arm (λ=0, correctness-only R = c).
# =============================================================================
# This is the CONTROL arm for the stronger thesis in THESIS.md, and the clean
# A/B counterpart to rlm-qwen3-30b-thesis.toml (the TREATMENT). It is a faithful
# twin of the treatment: SAME base model, LoRA, optimizer, caps, sampling,
# filters, the SAME multi-env training split (OOLONG-Spam + BrowseComp-Plus at
# equal 0.5/0.5 ratio), and the SAME unshaped four-env eval suite. The ONLY
# intended difference is the reward knob: both train envs set
# `shaping_coef = 0.0`, so the reward is exactly the authors' correctness-only
# R = c (the efficiency bonus is disabled).
#
# Use this with rlm-qwen3-30b-thesis.toml as the A/B pair: identical training
# DISTRIBUTION, identical everything except λ. (Do NOT use
# rlm-qwen3-30b-efficient-eval-suite.toml as the control — it trains a single
# OOLONG-Spam env at ratio 1.0, which changes the training data distribution and
# confounds the reward comparison.) The invariant "control == treatment except
# the shaping knobs" is enforced by tools/validate_thesis_shaping.py.
#
# Requires the eval-suite env packages (one dir per env, like oolong/):
#   uv pip install -e training/environments/oolong \
#                  -e training/environments/oolong_pairs \
#                  -e training/environments/browsecomp_plus \
#                  -e training/environments/longbench_codeqa
# Launch:
#   RLM_TRAIN_EXEC_TIMEOUT_S=180 uv run rl @ training/configs/rlm-qwen3-30b-thesis-control.toml

output_dir = "outputs/rlm-qwen3-30b-thesis-control"
max_steps = 200
seq_len = 8192

[model]
name = "Qwen/Qwen3-30B-A3B-Instruct-2507"

[wandb]
project = "rlm-qwen3-30b"
name = "qwen3-30b-thesis-control"

[deployment]
gpus_per_node = 8
num_train_gpus = 4
num_infer_gpus = 4

[trainer]

[trainer.model]
fused_lm_head_token_chunk_size = "auto"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[trainer.model.ac]
mode = "full"
freq = 1

[trainer.model.lora]
rank = 32
alpha = 64
dropout = 0.0
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]

[trainer.ckpt]
interval = 20
keep_interval = 20

[trainer.ckpt.weights]
# prime-rl writes PEFT-compatible raw adapters under weights/step_N/lora_adapters/.
# Upload that directory to HF for adapter-only repos (~50-60 MB), not the merged step_N root.
save_adapter_separately = true

[trainer.optim]
lr = 5e-5

[inference]
gpu_memory_utilization = 0.80

[inference.model]
max_model_len = 16384
enforce_eager = false

[inference.parallel]
tp = 2
dp = 2

[orchestrator]
batch_size = 32
group_size = 8

[orchestrator.model.lora]
# Stable adapter name used by vLLM when prime-rl hot-loads LoRA updates.
name = "qwen3-30b-thesis-control-lora"

[[orchestrator.pre_batch_filters]]
type = "repetition"
enforce = true
window = 3000
prob_threshold = 0.99

[[orchestrator.pre_batch_filters]]
type = "zero_advantage"
enforce = true

[orchestrator.ckpt]
interval = 20
keep_interval = 20

[orchestrator.train.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

# Training: equal-weight OOLONG-Spam + BrowseComp-Plus split.
# prime-rl treats `ratio` as a relative sampling weight; all train envs set it.
[[orchestrator.train.env]]
id = "oolong"
name = "rlm-oolong-spam-train-control"
ratio = 0.5

[orchestrator.train.env.args]
timeout_seconds = 1200
dataset_name = "spam"
context_len = [32768, 65536]
filter_numerical = true
num_examples = -1
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0
# --- THESIS knobs (the only behavioral difference vs. the efficient config) ---
# shaping_coef = 0.0 -> exactly R = c (control). > 0 -> R = c·(1+λ·e) (treatment).
shaping_coef = 0.0
# Bonus only applies to fully-correct rollouts; efficiency is a tie-breaker.
correct_threshold = 1.0
# Efficiency axes (fewer-is-better). The turns axis uses max_iterations as its
# budget automatically; set sub-call / token budgets here to enable those axes.
subcall_budget = 32.0
token_budget = 200000.0
iteration_weight = 1.0
subcall_weight = 1.0
token_weight = 1.0

[[orchestrator.train.env]]
id = "browsecomp_plus"
name = "rlm-browsecomp-plus-train-control"
ratio = 0.5

[orchestrator.train.env.args]
timeout_seconds = 1200
num_examples = 150
k = 50
reward_mode = "judge"
judge_model = "openai/gpt-4.1"
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0
# Same thesis knobs as OOLONG: efficiency is a tie-breaker among judge-correct rollouts.
shaping_coef = 0.0
correct_threshold = 1.0
subcall_budget = 32.0
token_budget = 200000.0
iteration_weight = 1.0
subcall_weight = 1.0
token_weight = 1.0

[orchestrator.eval]
interval = 20
# Explicitly keep prime-rl's startup eval enabled: step 0 is the base-model baseline
# before any trainer update (LoRA is absent/zero-effect before the first weight sync).
skip_first_step = false
num_examples = 25
group_size = 1

[orchestrator.eval.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

# Eval suite is UNSHAPED on purpose: evals must measure correctness (P1) and
# trajectory cost (P2/P3) under the stock R = c, so the shaped train reward is
# never allowed to inflate reported accuracy.
[[orchestrator.eval.env]]
id = "oolong"
name = "rlm-oolong-trec-coarse-132k-eval"
num_examples = 50
group_size = 1

[orchestrator.eval.env.args]
timeout_seconds = 1200
dataset_name = "trec_coarse"
context_len = 131072
filter_numerical = false
num_examples = 50
max_iterations = 20
sub_max_tokens = 4096

[[orchestrator.eval.env]]
id = "oolong_pairs"
name = "rlm-oolong-pairs-32k-eval"
num_examples = 20
group_size = 1

[orchestrator.eval.env.args]
timeout_seconds = 1200
context_len = 32768
num_examples = 20
max_iterations = 20
sub_max_tokens = 4096

[[orchestrator.eval.env]]
id = "browsecomp_plus"
name = "rlm-browsecomp-plus-eval"
num_examples = 150
group_size = 1

[orchestrator.eval.env.args]
timeout_seconds = 1200
num_examples = 150
k = 50
reward_mode = "judge"
judge_model = "openai/gpt-4.1"
max_iterations = 20
sub_max_tokens = 4096

[[orchestrator.eval.env]]
id = "longbench_codeqa"
name = "rlm-longbench-codeqa-eval"
num_examples = 50
group_size = 1

[orchestrator.eval.env.args]
timeout_seconds = 1200
num_examples = 50
max_iterations = 20
sub_max_tokens = 4096
