output_dir = "outputs/rlm-qwen3-30b-spam-train-trec-eval"
max_steps = 200
seq_len = 8192

[model]
name = "Qwen/Qwen3-30B-A3B-Instruct-2507"

[wandb]
project = "rlm-qwen3-30b"
name = "qwen3-30b-spam-train-trec-eval"

[deployment]
gpus_per_node = 8
num_train_gpus = 4
num_infer_gpus = 4

[trainer]

[trainer.model]
fused_lm_head_token_chunk_size = "auto"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[trainer.model.ac]
mode = "full"
freq = 1

[trainer.model.lora]
rank = 32
alpha = 64
dropout = 0.0
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]

[trainer.ckpt]
interval = 20
keep_interval = 20

[trainer.ckpt.weights]
# prime-rl writes PEFT-compatible raw adapters under weights/step_N/lora_adapters/.
# Upload that directory to HF for adapter-only repos (~50-60 MB), not the merged step_N root.
save_adapter_separately = true

[trainer.optim]
lr = 5e-5

[inference]
gpu_memory_utilization = 0.80

[inference.model]
max_model_len = 16384
enforce_eager = false

[inference.parallel]
tp = 2
dp = 2

[orchestrator]
batch_size = 32
group_size = 2

[orchestrator.model.lora]
# Stable adapter name used by vLLM when prime-rl hot-loads LoRA updates.
name = "qwen3-30b-spam-train-trec-eval-lora"

[[orchestrator.pre_batch_filters]]
type = "repetition"
enforce = true
window = 3000
prob_threshold = 0.99

[[orchestrator.pre_batch_filters]]
type = "zero_advantage"
enforce = true

[orchestrator.ckpt]
interval = 20
keep_interval = 20

[orchestrator.train.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

[[orchestrator.train.env]]
id = "oolong"
name = "oolong-spam-train"
ratio = 1.0

[orchestrator.train.env.args]
dataset_name = "spam"
context_len = [32768, 65536]
filter_numerical = true
num_examples = -1
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0

[orchestrator.eval]
interval = 20
# Explicitly keep prime-rl's startup eval enabled: step 0 is the base-model baseline
# before any trainer update (LoRA is absent/zero-effect before the first weight sync).
skip_first_step = false
num_examples = 25
group_size = 1

[orchestrator.eval.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

[[orchestrator.eval.env]]
id = "oolong"
name = "oolong-trec-coarse-eval"
num_examples = 25
group_size = 1

[orchestrator.eval.env.args]
dataset_name = "trec_coarse"
context_len = 131072
filter_numerical = false
num_examples = 25
max_iterations = 20
sub_max_tokens = 4096
